<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M100 30 L155 55 L155 110 Q155 150 100 175 Q45 150 45 110 L45 55 Z"
        fill="none" stroke="url(#shield)" stroke-width="3" filter="url(#glow)"/>
  <!-- Crack line through shield -->
  <path d="M85 50 L95 80 L82 95 L100 120 L90 155"
        fill="none" stroke="#ff3366" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Small lightning bolt at crack point -->
  <path d="M78 88 L82 95 L76 95 L82 105" fill="none" stroke="#ff3366" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- MCP text -->
  <text x="100" y="78" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="22" font-weight="bold" filter="url(#glow)">MCP</text>
</svg>
